
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký thành viên</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        input[type="text"],
        input[type="password"] {
            width: calc(100% - 20px); /* Adjust for padding */
            padding: 12px 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        .message {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .message a {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
        }

        .message a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Đăng ký tài khoản</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" placeholder="Nhập tên đăng nhập của bạn" required>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu" required>
            </div>
            <div class="form-group">
                <label for="password">Nhập lại mật khẩu</label>
                <input type="password" id="re_enter_password" placeholder="Nhập mật khẩu" required>
            </div>
            <button type="submit">Đăng ký</button>
        </form>
        <p class="message">Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a></p>
    </div>

    <script>
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();


            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const re_enter_password = document.getElementById('re_enter_password').value ;
            if (re_enter_password != password) {
                document.getElementById('re_enter_password').focus();
                alert("xac nhan mat khau khong dung")
                return
            } 

            const response = await fetch ('http://127.0.0.1:8000/register',{
                method : "POST" ,
                headers : {
                    'Content-type' : 'application/json'
                },
                body : JSON.stringify( {user_name : username , password : password })
            })  
            if (response.ok) {
                alert("tao mat khau thanh cong")
                sessionStorage.setItem('username' , username)
                sessionStorage.setItem('password' , password)
                window.location.href = "login.html"
            }else{
                alert("chưa điền đủ thông tin")
            }
            
        };
    </script>
</body>
</html>
