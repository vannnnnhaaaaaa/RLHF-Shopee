<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống</title>
    <style>
        :root {
            --primary-color: #ff4500;
            --bg-color: #f0f2f5;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        h2 {
            margin-bottom: 30px;
            color: var(--text-color);
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #666;
        }

        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(255, 69, 0, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #e03e00;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }

        .footer-text a {
            color: var(--primary-color);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Đăng Nhập</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" placeholder="Nhập tài khoản" required>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" id="loginBtn">Đăng Nhập</button>
        </form>
        <div class="footer-text">
            Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
        </div>
    </div>

    <script>
        // Giữ nguyên logic xử lý của bạn nhưng thêm hiệu ứng loading
        window.onload = () => {
            const username = sessionStorage.getItem('username');
            const password = sessionStorage.getItem('password');
            if (username && password) {
                document.getElementById('username').value = username;
                document.getElementById('password').value = password;
            }
            sessionStorage.removeItem('username');
            sessionStorage.removeItem('password');
        }

        document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
            
        const btn = document.getElementById('loginBtn');
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        // 1. Hiệu ứng đang xử lý
        btn.innerText = "Đang xác thực...";
        btn.style.opacity = "0.7";
        btn.disabled = true;

        // 2. Chuẩn bị dữ liệu theo định dạng Form Data (Chuẩn OAuth2)
        const formData = new URLSearchParams();
        formData.append('username', username); // Phải là 'username' để khớp với OAuth2PasswordRequestForm
        formData.append('password', password);

        try {
            const response = await fetch('http://127.0.0.1:8000/login', {
                method: 'POST',
                // 3. Header phải là x-www-form-urlencoded
                headers: { 
                    "Content-Type": 'application/x-www-form-urlencoded' 
                },
                body: formData.toString()
            });

            const data = await response.json();

            if (response.ok) {
                // Lưu thông tin vào LocalStorage
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('auth', data.auth);

                // 4. Chuyển trang dựa trên role
                // Lưu ý: data.auth phải khớp với giá trị bạn trả về từ Backend (ví dụ: 'admin' hoặc 'member')
                if (data.auth === 'admin') {
                    window.location.href = 'dashboard.html';
                } else {
                    window.location.href = 'memberdashboard.html';
                }
            } else {
                // Xử lý lỗi trả về từ FastAPI (thường nằm trong mục detail)
                let errorMsg = "Sai tài khoản hoặc mật khẩu!";
                if (data.detail) {
                    errorMsg = typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail);
                }
                alert(errorMsg);

                // Khôi phục trạng thái nút
                resetButton(btn);
            }
        } catch (error) {
            console.error("Login Error:", error);
            alert("Không thể kết nối tới máy chủ!");
            resetButton(btn);
        }
};  

// H    àm bổ trợ để reset nút bấm
function resetButton(btn) {
        btn.innerText = "Đăng Nhập";
        btn.style.opacity = "1";
        btn.disabled = false;
}   
    </script>
</body>
</html>
