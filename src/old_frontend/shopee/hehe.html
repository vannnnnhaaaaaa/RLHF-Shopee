<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sơ đồ thủ tục hải quan</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }
        .diagram {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        svg {
            display: block;
        }
        .box {
            fill: #ffffff;
            stroke: #333333;
            stroke-width: 1.5px;
        }
        .line {
            stroke: #555555;
            stroke-width: 1.5px;
            fill: none;
        }
        .text {
            font-family: Arial, sans-serif;
            font-size: 14px;
            fill: #222222;
        }
    </style>
</head>
<body>
    <div class="diagram">
        <svg width="820" height="400" xmlns="http://www.w3.org/2000/svg">
            <line x1="120" y1="200" x2="170" y2="80" class="line"/>
            <line x1="120" y1="200" x2="170" y2="160" class="line"/>
            <line x1="120" y1="200" x2="170" y2="240" class="line"/>
            <line x1="120" y1="200" x2="170" y2="320" class="line"/>

            <line x1="300" y1="80" x2="350" y2="80" class="line"/>
            <line x1="300" y1="160" x2="350" y2="160" class="line"/>
            <line x1="300" y1="240" x2="350" y2="240" class="line"/>
            <line x1="300" y1="320" x2="350" y2="320" class="line"/>

            <line x1="450" y1="80" x2="500" y2="80" class="line"/>
            <line x1="450" y1="160" x2="500" y2="160" class="line"/>
            <line x1="450" y1="240" x2="500" y2="240" class="line"/>
            <line x1="450" y1="320" x2="500" y2="320" class="line"/>

            <line x1="630" y1="80" x2="680" y2="200" class="line"/>
            <line x1="630" y1="160" x2="680" y2="200" class="line"/>
            <line x1="630" y1="240" x2="680" y2="200" class="line"/>
            <line x1="630" y1="320" x2="680" y2="200" class="line"/>

            <line x1="735" y1="230" x2="735" y2="290" class="line"/>

            <rect x="10" y="170" width="110" height="60" class="box"/>
            <text x="65" y="195" text-anchor="middle" class="text">Người khai</text>
            <text x="65" y="215" text-anchor="middle" class="text">hải quan</text>

            <rect x="170" y="55" width="130" height="50" class="box"/>
            <text x="235" y="75" text-anchor="middle" class="text">1 - Khai báo hải</text>
            <text x="235" y="95" text-anchor="middle" class="text">quan</text>

            <rect x="170" y="135" width="130" height="50" class="box"/>
            <text x="235" y="165" text-anchor="middle" class="text">3 - Xuất trình</text>

            <rect x="170" y="215" width="130" height="50" class="box"/>
            <text x="235" y="235" text-anchor="middle" class="text">6 - Chấp hàng</text>
            <text x="235" y="255" text-anchor="middle" class="text">quyết định</text>

            <rect x="170" y="295" width="130" height="50" class="box"/>
            <text x="235" y="325" text-anchor="middle" class="text">7 - Thông quan</text>

            <rect x="350" y="50" width="100" height="300" fill="#fafafa" stroke="#333" stroke-width="1.5px"/>
            <text x="400" y="182" text-anchor="middle" class="text">Hàng hóa</text>
            <text x="400" y="200" text-anchor="middle" class="text">xuất nhập</text>
            <text x="400" y="218" text-anchor="middle" class="text">khẩu</text>

            <rect x="500" y="50" width="130" height="60" class="box"/>
            <text x="565" y="67" text-anchor="middle" class="text">2 - Tiếp nhận và</text>
            <text x="565" y="85" text-anchor="middle" class="text">ra quyết định hình </text>
            <text x="565" y="103" text-anchor="middle" class="text">thức kiểm tra</text>

            <rect x="500" y="135" width="130" height="50" class="box"/>
            <text x="565" y="165" text-anchor="middle" class="text">4 - Kiểm tra</text>

            <rect x="500" y="215" width="130" height="50" class="box"/>
            <text x="565" y="245" text-anchor="middle" class="text">5 - Ra quyết định</text>

            <rect x="500" y="295" width="130" height="50" class="box"/>
            <text x="565" y="315" text-anchor="middle" class="text">8 - Giám sát</text>
            <text x="565" y="335" text-anchor="middle" class="text">thông quan</text>

            <rect x="680" y="170" width="110" height="60" class="box"/>
            <text x="735" y="195" text-anchor="middle" class="text">Công chức</text>
            <text x="735" y="215" text-anchor="middle" class="text">hải quan</text>

            <rect x="680" y="290" width="110" height="60" class="box"/>
            <text x="735" y="307" text-anchor="middle" class="text">9 - Kiểm tra</text>
            <text x="735" y="325" text-anchor="middle" class="text">sau thông</text>
            <text x="735" y="343" text-anchor="middle" class="text">quan</text>
        </svg>
    </div>
</body>
</html>
